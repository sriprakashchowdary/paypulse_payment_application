name: flutter_application_1
description: "PayPulse — AI-Powered Digital Wallet"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  mailer: ^6.3.1

  # State Management
  flutter_riverpod: ^2.5.1

  # UI & Utils
  intl: ^0.20.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.0
  go_router: ^14.0.0
  http: ^1.6.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  card_scanner: ^1.0.2
  local_auth: ^3.0.1
  flutter_tts: ^4.1.0
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/paypulse_icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon/paypulse_icon.png"
